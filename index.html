<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>定位展示知识点视图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        .knowledge-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 20px auto;
            border: 1px solid #eee;
            background-color: #f9f9f9;
        }

        .center-icon {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 200px auto 0;
            z-index: 10;
        }

        .center-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .knowledge-card {
            position: absolute;
            width: 220px;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 5;
        }

        .card-top-left {
            top: 50px;
            left: 80px;
        }

        .card-bottom-left {
            bottom: 80px;
            left: 80px;
        }

        .card-bottom-right {
            bottom: 80px;
            right: 80px;
        }

        .knowledge-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .knowledge-card ul {
            list-style-type: disc;
            padding-left: 20px;
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="knowledge-container">
        <div class="center-icon">
            <img src=D:\lab4-1-117-陈家民\image\lab1.png alt="中央图标">
        </div>

        <div class="knowledge-card card-top-left">
            <h4>HTML基础和HTML5</h4>
            <ul>
                <li>HTML标签与属性</li>
                <li>HTML5多媒体（视频和音频）</li>
                <li>HTML5图形标签</li>
                <li>HTML5地理位置</li>
                <li>HTML5表单</li>
            </ul>
        </div>

        <div class="knowledge-card card-bottom-left">
            <h4>CSS基础和CSS3</h4>
            <ul>
                <li>CSS选择器</li>
                <li>CSS样式与定位</li>
                <li>CSS3 2D与3D转换</li>
                <li>CSS3过渡与动画</li>
                <li>CSS3边框效果</li>
            </ul>
        </div>

        <div class="knowledge-card card-bottom-right">
            <h4>JavaScript</h4>
            <ul>
                <li>数据类型</li>
                <li>运算符</li>
                <li>基础语法</li>
                <li>DOM对象</li>
                <li>JS特效</li>
            </ul>
        </div>
    </div>
</body>
</html>
